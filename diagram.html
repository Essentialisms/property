<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Architecture</title>
<style>
  body {
    margin: 0;
    padding: 3rem 2rem;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, sans-serif;
    background: #f6f7fb;
    color: #0f172a;
    display: flex;
    justify-content: center;
  }
  .diagram { width: min(1200px, 100%); }
  svg { width: 100%; height: auto; display: block; }
  text { font-family: inherit; font-weight: 600; }
  .label { font-size: 14px; fill: #0f172a; }
  .edge-label { font-size: 11px; fill: #475569; font-weight: 500; }
  .group-label { font-size: 11px; fill: #64748b; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="diagram">
<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- arrow heads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <!-- drop shadow -->
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Client group -->
  <g>
    <rect x="40" y="60" width="240" height="380" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4" filter="url(#card-shadow)"/>
    <text class="group-label" x="60" y="90">Client</text>

    <!-- Chrome Extension -->
    <rect x="70" y="110" width="180" height="100" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="160" y="155" text-anchor="middle" font-size="22">🧩</text>
    <text class="label" x="160" y="185" text-anchor="middle">Chrome Extension</text>

    <!-- Web App -->
    <rect x="70" y="280" width="180" height="100" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="160" y="325" text-anchor="middle" font-size="22">💻</text>
    <text class="label" x="160" y="355" text-anchor="middle">Web App</text>
  </g>

  <!-- Server group -->
  <g>
    <rect x="440" y="60" width="260" height="500" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4" filter="url(#card-shadow)"/>
    <text class="group-label" x="460" y="90">Server</text>

    <!-- Next.js Backend -->
    <rect x="470" y="200" width="200" height="110" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="570" y="246" text-anchor="middle" font-size="22">⚙️</text>
    <text class="label" x="570" y="276" text-anchor="middle">Next.js Backend</text>

    <!-- Supabase -->
    <rect x="470" y="420" width="200" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="570" y="465" text-anchor="middle" font-size="22">🗄️</text>
    <text class="label" x="570" y="495" text-anchor="middle">Supabase</text>

    <!-- Persistence edge -->
    <path d="M 570 315 L 570 415" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow-dashed)"/>
    <text class="edge-label" x="588" y="370" fill="#16a34a">Persistence</text>
  </g>

  <!-- Browserbase -->
  <g>
    <rect x="800" y="220" width="200" height="110" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="900" y="266" text-anchor="middle" font-size="22">🌐</text>
    <text class="label" x="900" y="296" text-anchor="middle">Browserbase</text>
  </g>

  <!-- Target Website -->
  <g>
    <rect x="1060" y="80" width="130" height="110" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#card-shadow)"/>
    <text class="label" x="1125" y="126" text-anchor="middle" font-size="22">🎯</text>
    <text class="label" x="1125" y="156" text-anchor="middle">Target</text>
    <text class="label" x="1125" y="174" text-anchor="middle">Website</text>
  </g>

  <!-- Edges -->
  <!-- Chrome Extension → Target Website : gets cookies -->
  <path d="M 250 160 C 600 160 800 130 1060 130" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="edge-label" x="640" y="130" text-anchor="middle">gets cookies</text>

  <!-- Chrome Extension → Backend : sends cookies -->
  <path d="M 250 200 C 350 200 380 250 470 250" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="edge-label" x="350" y="215" text-anchor="middle">sends cookies</text>

  <!-- Web App → Backend -->
  <path d="M 250 330 C 350 330 380 270 470 270" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="edge-label" x="350" y="320" text-anchor="middle">API</text>

  <!-- Backend → Browserbase : launches workers -->
  <path d="M 670 270 L 800 275" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="edge-label" x="735" y="265" text-anchor="middle">launches workers</text>

  <!-- Browserbase → Target Website : performs actions -->
  <path d="M 1000 250 C 1080 250 1110 220 1125 190" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text class="edge-label" x="1075" y="225" text-anchor="middle">performs actions</text>
</svg>
</div>
</body>
</html>
