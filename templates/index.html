<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlin Property Finder</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Berlin Property Finder</h1>
            <span class="search-mode-badge" id="searchModeBadge" title="Search mode"></span>
            <div class="auth-slot" id="authSlot"></div>
        </div>
    </header>

    <!-- Auth modal -->
    <div class="modal" id="authModal">
        <div class="modal-card">
            <div class="modal-head">
                <h2 id="authModalTitle">Sign in</h2>
                <button class="modal-close" id="authModalClose">×</button>
            </div>
            <div class="modal-body">
                <label>Email <input type="email" id="authEmail" autocomplete="email"></label>
                <label>Password <input type="password" id="authPassword" autocomplete="current-password"></label>
                <div class="auth-error" id="authModalError"></div>
                <button class="modal-primary" id="authModalSubmit" data-mode="signin">Sign in</button>
                <div class="auth-switch" id="authModalSwitch"></div>
            </div>
        </div>
    </div>

    <!-- Paywall modal -->
    <div class="modal" id="paywallModal">
        <div class="modal-card">
            <div class="modal-head">
                <h2 id="paywallTitle">Upgrade to keep searching</h2>
                <button class="modal-close" id="paywallClose">×</button>
            </div>
            <div class="modal-body">
                <p id="paywallSubtitle"></p>
                <button class="modal-primary" id="paywallSignUp">Create free account</button>
                <div id="paywallPlans" class="paywall-plans">
                    <button class="paywall-plan-btn" data-plan="weekly">
                        <strong>Weekly</strong><span>€1.50/week</span>
                    </button>
                    <button class="paywall-plan-btn" data-plan="monthly">
                        <strong>Monthly</strong><span>€5/month</span>
                    </button>
                    <button class="paywall-plan-btn" data-plan="yearly">
                        <strong>Yearly</strong><span>€60/year</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main>
        <!-- Natural Language Search -->
        <section class="nl-search">
            <div class="search-bar">
                <input type="text" id="nlQuery"
                       placeholder="Describe what you're looking for... e.g. 'affordable land in Treptow under 250k'"
                       autocomplete="off">
                <button id="searchBtn" onclick="doSearch()">Search</button>
            </div>
        </section>

        <!-- Structured Filters (collapsible) -->
        <section class="filters">
            <button class="filters-toggle" onclick="toggleFilters()">
                <span id="filtersToggleText">Show filters</span>
            </button>
            <div class="filters-panel" id="filtersPanel">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="budget">Budget (EUR)</label>
                        <input type="number" id="budget" placeholder="e.g. 300000" min="0" step="10000">
                    </div>
                    <div class="filter-group">
                        <label for="propertyType">Property Type (cmd/ctrl-click for multiple)</label>
                        <select id="propertyType" multiple size="3">
                            <option value="land">Land / Grundstück</option>
                            <option value="apartment">Apartment / Wohnung</option>
                            <option value="house">House / Haus</option>
                        </select>
                    </div>
                    <div class="filter-group" id="houseSubtypeGroup" style="display:none;">
                        <label for="houseSubtype">House Subtype (cmd/ctrl-click for multiple)</label>
                        <select id="houseSubtype" multiple size="4">
                            <option value="detached">Single-family (Einfamilienhaus)</option>
                            <option value="semi_detached">Semi-detached (Doppelhaushälfte)</option>
                            <option value="townhouse">Townhouse (Reihenhaus)</option>
                            <option value="villa">Villa</option>
                            <option value="bungalow">Bungalow</option>
                            <option value="multi_family">Multi-family (Mehrfamilienhaus)</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="district">District (cmd/ctrl-click for multiple)</label>
                        <select id="district" multiple size="4"></select>
                    </div>
                    <div class="filter-group">
                        <label for="excludedDistricts">Exclude (cmd/ctrl-click for multiple)</label>
                        <select id="excludedDistricts" multiple size="4"></select>
                    </div>
                    <div class="filter-group">
                        <label for="minSize">Min Size (m²)</label>
                        <input type="number" id="minSize" placeholder="e.g. 50" min="0">
                    </div>
                    <div class="filter-group">
                        <label for="residenceType">Residence</label>
                        <select id="residenceType">
                            <option value="">Any</option>
                            <option value="permanent">Permanent residence (Hauptwohnsitz)</option>
                            <option value="weekend">Weekend / vacation only</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="constructionStatus">Build status</label>
                        <select id="constructionStatus">
                            <option value="">Any</option>
                            <option value="existing">Already built</option>
                            <option value="new_build">New build (Erstbezug)</option>
                            <option value="to_build">Still to be built (Neubauprojekt)</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sortBy">Sort By</label>
                        <select id="sortBy">
                            <option value="deal_score">Best Deal</option>
                            <option value="growth_score">Growth Potential</option>
                            <option value="price">Lowest Price</option>
                            <option value="size">Largest Size</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Demo mode banner -->
        <div class="demo-banner" id="demoBanner" style="display:none;">
            <strong>Demo Mode</strong> — <span id="demoMessage">Showing sample data</span>
        </div>

        <!-- Parsed query feedback -->
        <div class="parsed-params" id="parsedParams" style="display:none;"></div>

        <!-- Results summary -->
        <div class="results-summary" id="resultsSummary" style="display:none;">
            <span id="summaryText"></span>
        </div>

        <!-- Loading overlay -->
        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Searching properties...</p>
        </div>

        <!-- Results grid -->
        <div class="results-grid" id="resultsGrid"></div>

        <!-- District Reference -->
        <section class="district-ref">
            <button class="district-ref-toggle" onclick="toggleDistrictRef()">
                District Price Reference
            </button>
            <div class="district-ref-panel" id="districtRefPanel" style="display:none;">
                <table id="districtTable">
                    <thead>
                        <tr>
                            <th>District</th>
                            <th>Avg Price/m²</th>
                            <th>Growth</th>
                            <th>Tier</th>
                        </tr>
                    </thead>
                    <tbody id="districtTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>Berlin Property Finder &mdash; Data from ImmoScout24 &amp; Berlin market reports (2025)</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
