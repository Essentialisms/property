{% extends "_layout.html" %}
{% block title %}Sign up — Berlin Property Finder{% endblock %}
{% block content %}
<section class="auth-card">
    <h2>Create an account</h2>
    <p class="muted">Sign up to subscribe to agentic real estate search.</p>
    <form method="post" action="{{ url_for('auth.signup') }}">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8">
        <p class="muted">At least 8 characters.</p>

        <button type="submit" class="primary">Create account</button>
    </form>
    <p class="muted">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>.</p>
</section>
{% endblock %}
